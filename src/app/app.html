<div class="page-shell">
  <header class="page-header">
    <div>
      <h1>Virtualized Scrolling Demo</h1>
    </div>
  </header>

  <main class="layout">
    <app-users-panel
      [users]="store.users()"
      [selectedUserIds]="store.usersSelected()"
      [totalUsersCount]="store.totalUsersCount()"
      (userToggled)="toggleUser($event)"
      (selectionCleared)="clearSelection()"
    />

    <app-posts-panel
      [posts]="store.filteredPosts()"
      [totalPostsCount]="store.totalPostsCount()"
      [search]="store.postSearch()"
      [sort]="store.sort()"
      [resolveAuthor]="resolveAuthor"
      [dialogOpen]="!!store.selectedPost()"
      (searchChange)="onSearchChange($event)"
      (searchCleared)="onSearchCleared()"
      (sortChange)="onSortChange($event)"
      (postOpened)="openPost($event)"
    />
  </main>

  @if (store.selectedPost(); as post) {
    <app-post-dialog
      [post]="post"
      [author]="resolveAuthor(post.userId)"
      [comments]="store.selectedPostComments()"
      (closed)="closePost()"
    />
  }
</div>
